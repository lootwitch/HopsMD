<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80" role="img" aria-label="HopsMD">
  <rect width="200" height="80" rx="10" fill="#1f2a24"/>
  <g transform="translate(28 40)">
    <!-- simple hop cone -->
    <g fill="#8bc34a" stroke="#5a8f2e" stroke-width="1.5">
      <ellipse cx="0" cy="-14" rx="8" ry="6"/>
      <ellipse cx="-5" cy="-6" rx="9" ry="6"/>
      <ellipse cx="5" cy="-6" rx="9" ry="6"/>
      <ellipse cx="-6" cy="2" rx="9" ry="6"/>
      <ellipse cx="6" cy="2" rx="9" ry="6"/>
      <ellipse cx="0" cy="9" rx="8" ry="6"/>
    </g>
    <line x1="0" y1="-20" x2="0" y2="-26" stroke="#5a8f2e" stroke-width="2"/>
  </g>
  <text x="60" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#f5f1e6">Hops<tspan fill="#8bc34a">MD</tspan></text>
</svg>
