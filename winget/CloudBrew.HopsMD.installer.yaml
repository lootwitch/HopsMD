# Template used for the FIRST manual submission to microsoft/winget-pkgs.
# After that, winget-releaser updates the existing manifest automatically.
#
# To use:
#   1. Cut release v1.0.0 (CI builds installers, sha256 hashes appear in
#      release-asset metadata).
#   2. Fork microsoft/winget-pkgs, copy this directory into
#      manifests/c/CloudBrew/HopsMD/1.0.0/ (path is derived from the
#      PackageIdentifier with the first letter lowercased).
#   3. Fill in InstallerSha256 below and PackageVersion if it drifted.
#   4. Open PR. Maintainers run automated validation; usually merged within a
#      day or two.
# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json

PackageIdentifier: CloudBrew.HopsMD
PackageVersion: 1.0.0
InstallerLocale: en-US
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
Scope: machine
ReleaseDate: 2026-05-19
Installers:
  - Architecture: x64
    InstallerType: nullsoft
    InstallerUrl: https://github.com/lootwitch/HopsMD/releases/download/v1.0.0/HopsMD_1.0.0_x64-setup.exe
    InstallerSha256: REPLACE_WITH_SHA256_OF_NSIS_INSTALLER
  - Architecture: x64
    InstallerType: wix
    InstallerUrl: https://github.com/lootwitch/HopsMD/releases/download/v1.0.0/HopsMD_1.0.0_x64_en-US.msi
    InstallerSha256: REPLACE_WITH_SHA256_OF_MSI_INSTALLER
ManifestType: installer
ManifestVersion: 1.12.0
